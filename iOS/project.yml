name: StandingDeskLog
options:
  bundleIdPrefix: com.shimondeitel.standlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StandingDeskLog:
    type: application
    platform: iOS
    sources:
      - path: StandingDeskLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StandingDeskLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StandingDeskLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StandingDeskLogTests
      - path: StandingDeskLog.storekit
    dependencies:
      - target: StandingDeskLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StandingDeskLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StandingDeskLogUITests
    dependencies:
      - target: StandingDeskLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StandingDeskLog:
    build:
      targets:
        StandingDeskLog: all
        StandingDeskLogTests: [test]
        StandingDeskLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StandingDeskLog.storekit
    test:
      config: Debug
      storeKitConfiguration: StandingDeskLog.storekit
      targets:
        - StandingDeskLogTests
        - StandingDeskLogUITests
    archive:
      config: Release
